name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: build / fmt / clippy / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azoth
    steps:
      - uses: actions/checkout@v4

      # rustup honors azoth/rust-toolchain.toml (channel 1.96.0 + rustfmt/clippy).
      - name: Show toolchain
        run: rustc --version && cargo --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            azoth/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('azoth/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

  python-reference:
    name: python reference self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Self-test
        run: python3 kpdc_reference.py
